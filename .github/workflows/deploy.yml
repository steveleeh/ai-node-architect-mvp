
name: Sync to Hugging Face space
on:
  push:
    branches: [main]
  # 允许手动触发
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: git push https://stvelee:$HF_TOKEN@huggingface.co/spaces/stvelee/ai-node-mvp main
